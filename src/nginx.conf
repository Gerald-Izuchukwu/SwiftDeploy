server {
    listen 8080;

    server_name localhost;

    location / {
        proxy_pass http://swift-deploy-node:3000;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /healthz {
        proxy_pass http://swift-deploy-node:3000/healthz;
    }

    location /chaos {
        proxy_pass http://swift-deploy-node:3000/chaos;
    }
}