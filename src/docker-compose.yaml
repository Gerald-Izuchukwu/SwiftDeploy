services:
  swift-deploy-node:
    image: swift-deploy-1-node:latest
    container_name: swift-deploy-node
    restart: unless-stopped
    ports:
      - 3000:3000
    networks:
      - swiftdeploy-net
    env_file:
      - ./nodejs/.env
  nginx:
    image: nginx:latest
    container_name: nginx
    restart: unless-stopped
    ports:
    - 8080:8080
    networks:
    - swiftdeploy-net
    # to mount our custom nginx.conf
    volumes:
    - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

networks:
  swiftdeploy-net:
    driver: bridge
