services:
  node:
    name: swiftdeploy-app-node
    container_name: swiftdeploy-app-node
    image: swift-deploy-1-node:latest
    port_on_host: 3000
    port_on_container: 3000
    network_name: swiftdeploy-net
    path_to_env: ./nodejs/.env
    MODE: canary
    PORT: 3000
    VERSION: 1.0

  python:
    name: swiftdeploy-app-python
    container_name: swiftdeploy-app-python
    image: swift-deploy-1-python:latest
    port_on_host: 5000
    port_on_container: 5000
    path_to_env: ./python/.env
    MODE: stable
    PORT: 5000
    VERSION: 1.0

nginx:
  image: nginx:latest
  container_name: nginx
  port_on_host: 8080
  port_on_container: 8080
  network_name: swiftdeploy-net
  volumes: ./nginx.conf:/etc/nginx/nginx.conf:ro
  log_path: /var/log/swiftdeploy
  proxy_timeout: 5s
  worker_processes: auto

network:
  name: swiftdeploy-net
  driver_type: bridge

defaults:
  restart_policy: unless-stopped

metrics:
  enabled: true
  scrape_interval: 20
  retention: 50
